<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividad 5 - Estadísticas</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
  <h1>Estadísticas Online</h1>

  <div id="formulario">
    <p class="item-text">Valor: </p>
    <input type="text" id="input-valor">
    <button id="btn-registrar">Registrar</button>
  </div>
  <hr>
  <div id="estadisticas">
    <div class="item">
      <p class="item-text">Cantidad: </p>
      <p id="cantidad">0</p>
    </div>
    <div class="item">
      <p class="item-text">Promedio: </p>
      <p id="promedio">0</p>
    </div>
    <div class="item">
      <p class="item-text">Menor: </p>
      <p id="menor">0</p>
    </div>
    <div class="item">
      <p class="item-text">Mayor: </p>
      <p id="mayor">0</p>
    </div>
  </div>
  <hr>
  <button id="btn-reiniciar">Reiniciar</button>

  <script src="script.js"></script>
</body>

</html>
